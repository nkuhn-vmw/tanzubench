id: debug-sql-join
name: Fix INNER JOIN dropping customers with no orders
category: debugging
grader: exec_unit_tests
timeout_sec: 60
prompt: |
  The following SQL query is supposed to return ALL customers and their order
  counts, including customers with zero orders. But it uses INNER JOIN, so
  customers with no orders are silently dropped.

  Fix the query by changing INNER JOIN to LEFT JOIN. Return ONLY the corrected
  SQL query.

  ```sql
  SELECT c.name, COUNT(o.id) as order_count
  FROM customers c
  INNER JOIN orders o ON c.id = o.customer_id
  GROUP BY c.name
  ```

  Bug: Bob has no orders and is missing from the results entirely.
  Expected output includes Bob with order_count = 0.
grader_config:
  language: sql
  schema: >
    CREATE TABLE customers(id INT, name TEXT);
    CREATE TABLE orders(id INT, customer_id INT);
    INSERT INTO customers VALUES (1,'Alice'),(2,'Bob'),(3,'Carol');
    INSERT INTO orders VALUES (1,1),(2,1),(3,3);
  unit_tests:
    - {expected: [["Alice", "2"], ["Bob", "0"], ["Carol", "1"]]}
