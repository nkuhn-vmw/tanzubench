id: reasoning-timeline
name: Timeline ordering — Project Helios events
category: reasoning
grader: llm_judge
timeout_sec: 90
prompt_template: |
  Read the following document and answer the question.

  DOCUMENT:
  {{ asset:timeline-source.md }}

  QUESTION: Order these three events chronologically: (A) the security vulnerability was discovered in the authentication module, (B) the first engineering prototype was demonstrated to the steering committee, (C) Helios v1.0 was released to general availability.
grader_config:
  judge_rubric: |
    Grade the answer on two axes, each 0.0-1.0:
    - factual_correctness: does the answer match what the document says
    - completeness: does the answer address every part of the question
      (if the question asks two things, both must be answered)
    Return JSON: {"factual_correctness": float, "completeness": float, "rationale": string}
  judge_aggregation: mean
  judge_temperature: 0.0
