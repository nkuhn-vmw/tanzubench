id: coding-py-algorithm
name: Merge two sorted lists
category: coding
grader: exec_unit_tests
timeout_sec: 60
prompt: |
  Write a Python function merge_sorted(a, b) that merges two sorted lists
  into one sorted list. Do NOT use sorted(), .sort(), or any built-in
  sorting. Implement the merge step manually using two pointers.

  Return the merged sorted list. Only the function in a code block.
grader_config:
  language: python
  entrypoint: merge_sorted
  unit_tests:
    - input: [[1, 3, 5], [2, 4, 6]]
      expected: [1, 2, 3, 4, 5, 6]
    - input: [[], [1, 2, 3]]
      expected: [1, 2, 3]
    - input: [[1, 1, 1], [1, 1]]
      expected: [1, 1, 1, 1, 1]
    - input: [[10], [1, 2, 3, 4, 5]]
      expected: [1, 2, 3, 4, 5, 10]
    - input: [[], []]
      expected: []
