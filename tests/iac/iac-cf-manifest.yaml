id: iac-cf-manifest
name: Generate CF app manifest JSON for Spring Boot
category: iac
grader: json_schema
timeout_sec: 30
prompt: |
  Generate a Cloud Foundry application manifest as JSON (not YAML) for a Spring Boot app
  named 'spring-api' with the following requirements:
  - 1G memory
  - 2 instances
  - health-check-type: http
  - health-check-http-endpoint: /actuator/health
  - buildpacks: java_buildpack

  The manifest must have a top-level "applications" array with the app config as the first
  element. Return only valid JSON, no explanation.
grader_config:
  schema:
    type: object
    required: [applications]
    properties:
      applications:
        type: array
        minItems: 1
        items:
          type: object
          required: [memory, instances, health-check-type, buildpacks]
          properties:
            memory:
              type: string
            instances:
              type: integer
            health-check-type:
              type: string
            buildpacks:
              type: array
              items:
                type: string
  expected_values:
    applications[0].memory: "1G"
    applications[0].instances: 2
