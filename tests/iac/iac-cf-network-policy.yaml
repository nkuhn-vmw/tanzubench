id: iac-cf-network-policy
name: Write CF network policy CLI commands
category: iac
grader: contains
timeout_sec: 60
prompt: |
  Write the CF CLI commands to create a network policy that allows the app 'frontend'
  to reach the app 'backend' on port 8080 over TCP in the same org and space.

  Both apps are deployed in org 'acme' and space 'production'. Include any necessary
  target/login context commands, then the network policy command. Explain briefly what
  each command does.
grader_config:
  must_contain: ["cf add-network-policy", "frontend", "backend", "8080"]
